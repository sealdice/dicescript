name: Test & Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=mod
      GOPROXY: https://proxy.golang.org,direct
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.18.x'

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test -v ./...

  lint:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=mod
      GOPROXY: https://proxy.golang.org,direct
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.18.x'

      - name: Download modules
        run: go mod download

      - name: Run go vet
        run: go vet -unreachable=false ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.57.2
          only-new-issues: true
          skip-pkg-cache: true
          skip-build-cache: true
          args: --timeout 9999s
